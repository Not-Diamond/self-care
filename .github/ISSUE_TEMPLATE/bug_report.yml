name: Bug Report
description: Report a bug in Self-Care
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `/self-care:run ...`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: trace-format
    attributes:
      label: Trace Format
      description: What type of trace were you analyzing?
      options:
        - OTEL JSON
        - Claude Code trace
        - LangSmith
        - LangFuse
        - Not applicable
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Run `/self-care:help` to check.
      placeholder: e.g. 1.0.0

  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code Version
      placeholder: e.g. 1.0.0

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
